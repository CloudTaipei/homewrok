<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>放學後學習紀錄</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;min-height:100vh;color:#1a1a1a}
.page{max-width:480px;margin:0 auto;padding:1.5rem 1rem 3rem}
.header{text-align:center;margin-bottom:2rem}
.header h1{font-size:22px;font-weight:500;margin-bottom:4px}
.header p{font-size:13px;color:#888}
.child-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem}
.child-card{border:1px solid #ddd;border-radius:12px;padding:1rem;text-align:center;cursor:pointer;background:#fff;transition:all .15s}
.child-card.selected{border:2px solid #378ADD;background:#E6F1FB}
.child-card .avatar{width:52px;height:52px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:500}
.jung .avatar{background:#CECBF6;color:#3C3489}
.vivi .avatar{background:#F4C0D1;color:#72243E}
.child-card .name{font-size:15px;font-weight:500}
.section{margin-bottom:1.25rem}
.sec-label{font-size:13px;font-weight:500;color:#666;margin-bottom:8px}
.group-label{font-size:11px;font-weight:500;color:#aaa;letter-spacing:.04em;margin:10px 0 6px}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{padding:7px 15px;border-radius:999px;border:1px solid #ccc;cursor:pointer;font-size:13px;color:#333;background:#fff;transition:all .15s;user-select:none}
.chip.sel-blue{background:#E6F1FB;border-color:#378ADD;color:#0C447C}
.chip.sel-green{background:#EAF3DE;border-color:#639922;color:#27500A}
.chip.sel-purple{background:#EEEDFE;border-color:#7F77DD;color:#3C3489}
.progress-wrap{margin-bottom:1.5rem}
.progress-wrap input{width:100%;padding:11px 14px;border:1px solid #ccc;border-radius:8px;font-size:14px;color:#1a1a1a;background:#fff;outline:none}
.submit-btn{width:100%;padding:13px;border-radius:12px;border:none;font-size:15px;font-weight:500;cursor:pointer;background:#378ADD;color:#fff}
.submit-btn:disabled{background:#e0e0e0;color:#aaa;cursor:not-allowed}
.success{display:none;text-align:center;padding:3rem 1rem}
.success .big{font-size:56px;margin-bottom:16px}
.success h2{font-size:22px;font-weight:500;margin-bottom:8px}
.success p{font-size:15px;color:#666;line-height:1.7;margin-bottom:2rem}
.success button{padding:10px 28px;border-radius:8px;border:1px solid #ccc;background:#fff;font-size:14px;cursor:pointer}
.err{font-size:13px;color:#c0392b;margin-bottom:10px;display:none}
.divider{border:none;border-top:1px solid #e0e0e0;margin:2rem 0}
.stats-header{text-align:center;margin-bottom:1.25rem}
.stats-header h2{font-size:18px;font-weight:500;margin-bottom:12px}
.tab-row{display:flex;gap:8px;justify-content:center;margin-bottom:1rem}
.tab{padding:7px 22px;border-radius:999px;border:1px solid #ccc;cursor:pointer;font-size:14px;color:#666;background:#fff;transition:all .15s}
.tab.active-jung{background:#EEEDFE;border-color:#7F77DD;color:#3C3489;font-weight:500}
.tab.active-vivi{background:#FBEAF0;border-color:#D4537E;color:#72243E;font-weight:500}
.period-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:1.5rem}
.period-btn{padding:5px 14px;border-radius:999px;border:1px solid #ccc;cursor:pointer;font-size:12px;color:#666;background:#fff;transition:all .15s}
.period-btn.active{background:#1a1a1a;border-color:#1a1a1a;color:#fff}
.metric-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:1.25rem}
.metric{background:#fff;border:1px solid #eee;border-radius:12px;padding:14px 10px;text-align:center}
.metric .val{font-size:22px;font-weight:500;margin-bottom:4px}
.metric .lbl{font-size:11px;color:#999}
.streak-val{color:#E88B00}
.card{background:#fff;border:1px solid #eee;border-radius:12px;padding:16px;margin-bottom:12px}
.card-title{font-size:13px;font-weight:500;color:#666;margin-bottom:12px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.bar-label{font-size:12px;color:#444;width:130px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-wrap{flex:1;background:#f0f0f0;border-radius:999px;height:8px}
.bar-fill{height:8px;border-radius:999px;background:#378ADD;transition:width .4s}
.bar-fill.vivi-color{background:#D4537E}
.bar-fill.zero{background:#ebebeb}
.bar-num{font-size:12px;color:#888;width:40px;text-align:right;flex-shrink:0}
.trend-wrap{display:flex;align-items:flex-end;gap:4px;height:80px;margin-bottom:8px;overflow-x:auto}
.trend-col{flex-shrink:0;min-width:28px;display:flex;flex-direction:column;align-items:center;gap:2px;height:100%;justify-content:flex-end}
.trend-bar{width:100%;border-radius:3px 3px 0 0;background:#378ADD;min-height:2px}
.trend-bar.vivi-color{background:#D4537E}
.trend-day{font-size:9px;color:#aaa;margin-top:2px;white-space:nowrap}
.trend-min{font-size:9px;color:#888}
.log-item{border-bottom:1px solid #f0f0f0;padding:10px 0}
.log-item:last-child{border-bottom:none}
.log-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.log-date{font-size:12px;color:#888}
.log-time{font-size:12px;font-weight:500;color:#378ADD}
.log-subjects{font-size:12px;color:#444;margin-bottom:2px}
.log-progress{font-size:12px;color:#666;background:#f7f7f5;border-radius:6px;padding:4px 8px;margin-top:4px}
.log-ways{font-size:11px;color:#aaa}
.loading{text-align:center;padding:2rem;color:#aaa;font-size:14px}
.empty{text-align:center;padding:1.5rem;color:#bbb;font-size:13px}
</style>
</head>
<body>
<div class="page">

  <div id="form-view">
    <div class="header">
      <h1>📖 放學後學習紀錄</h1>
      <p id="today"></p>
    </div>

    <div class="section">
      <div class="sec-label">今天是誰？</div>
      <div class="child-row">
        <div class="child-card jung" id="card-jung" onclick="selectChild('Jung')">
          <div class="avatar">J</div><div class="name">Jung</div>
        </div>
        <div class="child-card vivi" id="card-vivi" onclick="selectChild('Vivi')">
          <div class="avatar">V</div><div class="name">Vivi</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="sec-label">學習時間</div>
      <div class="chips" id="time-chips">
        <div class="chip" onclick="selectTime(this,'10')">10 分</div>
        <div class="chip" onclick="selectTime(this,'15')">15 分</div>
        <div class="chip" onclick="selectTime(this,'20')">20 分</div>
        <div class="chip" onclick="selectTime(this,'25')">25 分</div>
        <div class="chip" onclick="selectTime(this,'30')">30 分</div>
        <div class="chip" onclick="selectTime(this,'45')">45 分</div>
        <div class="chip" onclick="selectTime(this,'60')">60 分</div>
      </div>
    </div>

    <div class="section">
      <div class="sec-label">科目（可多選）</div>
      <div class="group-label">國語</div>
      <div class="chips">
        <div class="chip" onclick="toggleChip(this,'subjects','sel-blue')">國語－閱讀測驗</div>
        <div class="chip" onclick="toggleChip(this,'subjects','sel-blue')">國語－古文閱讀測驗</div>
      </div>
      <div class="group-label">數學</div>
      <div class="chips">
        <div class="chip" onclick="toggleChip(this,'subjects','sel-blue')">數學－課內</div>
        <div class="chip" onclick="toggleChip(this,'subjects','sel-blue')">數學－超前</div>
      </div>
      <div class="group-label">自然科學</div>
      <div class="chips">
        <div class="chip" onclick="toggleChip(this,'subjects','sel-blue')">自然</div>
        <div class="chip" onclick="toggleChip(this,'subjects','sel-blue')">生物</div>
        <div class="chip" onclick="toggleChip(this,'subjects','sel-blue')">化學</div>
        <div class="chip" onclick="toggleChip(this,'subjects','sel-blue')">物理</div>
      </div>
      <div class="group-label">英文</div>
      <div class="chips">
        <div class="chip" onclick="toggleChip(this,'subjects','sel-blue')">英文單字</div>
        <div class="chip" onclick="toggleChip(this,'subjects','sel-blue')">英文閱讀測驗</div>
        <div class="chip" onclick="toggleChip(this,'subjects','sel-blue')">英文－國中</div>
      </div>
      <div class="group-label">其他</div>
      <div class="chips">
        <div class="chip" onclick="toggleChip(this,'subjects','sel-blue')">社會</div>
        <div class="chip" onclick="toggleChip(this,'subjects','sel-blue')">課外閱讀</div>
      </div>
    </div>

    <div class="section">
      <div class="sec-label">學習方式（可多選）</div>
      <div class="chips">
        <div class="chip" onclick="toggleChip(this,'ways','sel-green')">上課</div>
        <div class="chip" onclick="toggleChip(this,'ways','sel-green')">閱讀－複習</div>
        <div class="chip" onclick="toggleChip(this,'ways','sel-green')">測驗</div>
        <div class="chip" onclick="toggleChip(this,'ways','sel-green')">錯題複習</div>
        <div class="chip" onclick="toggleChip(this,'ways','sel-green')">練習題</div>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="sec-label">進度（自己寫）</div>
      <input id="progress" type="text" placeholder="例：第3課、p.45–50、第二章練習">
    </div>

    <div class="err" id="err-msg">請確認已選擇名字、時間和至少一個科目。</div>
    <button class="submit-btn" id="submit-btn" onclick="submitForm()">記錄完成 ✓</button>
  </div>

  <div class="success" id="success-view">
    <div class="big">🎉</div>
    <h2 id="success-name"></h2>
    <p>今天的學習已記錄！<br>繼續保持，明天見。</p>
    <button onclick="resetForm()">再記錄一筆</button>
  </div>

  <hr class="divider">

  <div class="stats-header">
    <h2>📊 學習統計</h2>
    <div class="tab-row">
      <div class="tab active-jung" id="tab-jung" onclick="switchChild('Jung')">Jung</div>
      <div class="tab" id="tab-vivi" onclick="switchChild('Vivi')">Vivi</div>
    </div>
    <div class="period-row">
      <div class="period-btn active" onclick="switchPeriod('week',this)">本週</div>
      <div class="period-btn" onclick="switchPeriod('month',this)">本月</div>
      <div class="period-btn" onclick="switchPeriod('quarter',this)">本季</div>
      <div class="period-btn" onclick="switchPeriod('half',this)">半年</div>
      <div class="period-btn" onclick="switchPeriod('year',this)">全年</div>
    </div>
  </div>

  <div id="stats-content"><div class="loading">載入中…</div></div>

</div>
<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbwm2Zsoexr5DrEt_2gQQVPA1H1AUW0_gVPEsVLmQSu_h7MAZGdCoTSsh3aPZXtWEGb_/exec';

const ALL_SUBJECTS=[
  '國語－閱讀測驗','國語－古文閱讀測驗',
  '數學－課內','數學－超前',
  '自然','生物','化學','物理',
  '英文單字','英文閱讀測驗','英文－國中',
  '社會','課外閱讀'
];

let selectedChild='',selectedTime='';
let selectedSubjects=new Set(),selectedWays=new Set();
let statsChild='Jung',statsPeriod='week';
let cachedData={};

const DAYS=['日','一','二','三','四','五','六'];
const MONTHS=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const now=new Date();
document.getElementById('today').textContent=
  `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（週${DAYS[now.getDay()]}）`;

function selectChild(n){
  selectedChild=n;
  document.getElementById('card-jung').classList.toggle('selected',n==='Jung');
  document.getElementById('card-vivi').classList.toggle('selected',n==='Vivi');
}
function selectTime(el,v){
  selectedTime=v;
  document.querySelectorAll('#time-chips .chip').forEach(c=>c.classList.remove('sel-purple'));
  el.classList.add('sel-purple');
}
function toggleChip(el,group,cls){
  const set=group==='subjects'?selectedSubjects:selectedWays;
  const v=el.textContent;
  if(set.has(v)){set.delete(v);el.classList.remove(cls);}
  else{set.add(v);el.classList.add(cls);}
}

async function submitForm(){
  const err=document.getElementById('err-msg');
  if(!selectedChild||!selectedTime||selectedSubjects.size===0){err.style.display='block';return;}
  err.style.display='none';
  const btn=document.getElementById('submit-btn');
  btn.disabled=true;btn.textContent='傳送中…';
  const payload={child:selectedChild,time:selectedTime,subjects:[...selectedSubjects],ways:[...selectedWays],progress:document.getElementById('progress').value.trim()};
  try{
    await fetch(SCRIPT_URL+'?data='+encodeURIComponent(JSON.stringify(payload)),{method:'GET',mode:'no-cors'});
    document.getElementById('success-name').textContent=`${selectedChild}，做得好！`;
    document.getElementById('form-view').style.display='none';
    document.getElementById('success-view').style.display='block';
    delete cachedData[selectedChild];
    loadStats();
  }catch(e){
    btn.disabled=false;btn.textContent='記錄完成 ✓';
    err.textContent='傳送失敗，請確認網路連線。';err.style.display='block';
  }
}

function resetForm(){
  selectedChild='';selectedTime='';
  selectedSubjects.clear();selectedWays.clear();
  document.querySelectorAll('.chip').forEach(c=>c.className='chip');
  document.querySelectorAll('.child-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('progress').value='';
  document.getElementById('submit-btn').disabled=false;
  document.getElementById('submit-btn').textContent='記錄完成 ✓';
  document.getElementById('form-view').style.display='block';
  document.getElementById('success-view').style.display='none';
}

function switchChild(c){
  statsChild=c;
  document.getElementById('tab-jung').className='tab'+(c==='Jung'?' active-jung':'');
  document.getElementById('tab-vivi').className='tab'+(c==='Vivi'?' active-vivi':'');
  loadStats();
}
function switchPeriod(p,el){
  statsPeriod=p;
  document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderStats();
}

function getPeriodRange(){
  const t=new Date();t.setHours(0,0,0,0);
  const y=t.getFullYear(),m=t.getMonth();
  if(statsPeriod==='week'){
    const s=new Date(t);s.setDate(t.getDate()-t.getDay());
    return{start:s,end:new Date(t.getTime()+86400000)};
  }
  if(statsPeriod==='month'){
    return{start:new Date(y,m,1),end:new Date(y,m+1,1)};
  }
  if(statsPeriod==='quarter'){
    const q=Math.floor(m/3);
    return{start:new Date(y,q*3,1),end:new Date(y,q*3+3,1)};
  }
  if(statsPeriod==='half'){
    const h=m<6?0:6;
    return{start:new Date(y,h,1),end:new Date(y,h+6,1)};
  }
  if(statsPeriod==='year'){
    return{start:new Date(y,0,1),end:new Date(y+1,0,1)};
  }
}

function getMonthsInRange(start,end){
  const months=[];
  let y=start.getFullYear(),m=start.getMonth();
  const ey=end.getFullYear(),em=end.getMonth();
  while(y<ey||(y===ey&&m<em)){
    months.push({y,m});
    m++;if(m>11){m=0;y++;}
  }
  return months;
}

async function loadStats(){
  if(cachedData[statsChild]){renderStats();return;}
  document.getElementById('stats-content').innerHTML='<div class="loading">載入中…</div>';
  try{
    const res=await fetch(SCRIPT_URL+'?action=read&child='+statsChild);
    const json=await res.json();
    cachedData[statsChild]=(json.rows||[]).map(r=>({...r,timestamp:new Date(r.timestamp)}));
    renderStats();
  }catch(e){
    document.getElementById('stats-content').innerHTML='<div class="empty">無法載入資料，請稍後再試。</div>';
  }
}

function renderStats(){
  const rows=cachedData[statsChild]||[];
  const isVivi=statsChild==='Vivi';
  const cc=isVivi?'vivi-color':'';
  const {start,end}=getPeriodRange();
  const today=new Date();today.setHours(0,0,0,0);

  const filtered=rows.filter(r=>r.timestamp>=start&&r.timestamp<end);

  const todayMin=rows.filter(r=>{const d=new Date(r.timestamp);d.setHours(0,0,0,0);return d.getTime()===today.getTime();}).reduce((s,r)=>s+r.time,0);
  const periodMin=filtered.reduce((s,r)=>s+r.time,0);

  const daySet=new Set(rows.map(r=>{const d=new Date(r.timestamp);d.setHours(0,0,0,0);return d.getTime();}));
  let streak=0,chk=new Date(today);
  while(daySet.has(chk.getTime())){streak++;chk.setDate(chk.getDate()-1);}

  // 科目統計（保持分組順序）
  const subjectMap={};
  ALL_SUBJECTS.forEach(s=>subjectMap[s]=0);
  filtered.forEach(r=>{
    if(!r.subjects)return;
    r.subjects.split('、').forEach(s=>{if(subjectMap[s]!==undefined)subjectMap[s]+=r.time;});
  });
  const subjectArr=ALL_SUBJECTS.map(s=>[s,subjectMap[s]]);
  const maxS=Math.max(...subjectArr.map(x=>x[1]),1);

  // 趨勢
  let trendCols=[];
  if(statsPeriod==='week'){
    trendCols=DAYS.map((label,i)=>{
      const min=filtered.filter(r=>r.timestamp.getDay()===i).reduce((s,r)=>s+r.time,0);
      return{label,min};
    });
  }else if(statsPeriod==='month'){
    const daysInMonth=new Date(start.getFullYear(),start.getMonth()+1,0).getDate();
    trendCols=Array.from({length:daysInMonth},(_,i)=>{
      const day=i+1;
      const min=filtered.filter(r=>r.timestamp.getDate()===day).reduce((s,r)=>s+r.time,0);
      return{label:String(day),min};
    });
  }else{
    const monthList=getMonthsInRange(start,end);
    trendCols=monthList.map(({y,m})=>{
      const min=filtered.filter(r=>r.timestamp.getFullYear()===y&&r.timestamp.getMonth()===m).reduce((s,r)=>s+r.time,0);
      return{label:MONTHS[m],min};
    });
  }
  const maxT=Math.max(...trendCols.map(c=>c.min),1);
  const periodLabel={'week':'本週','month':'本月','quarter':'本季','half':'半年','year':'全年'}[statsPeriod];

  // 進度紀錄（依期間過濾，有進度才顯示）
  const logs=[...filtered].reverse().filter(r=>r.progress&&r.progress.trim());

  document.getElementById('stats-content').innerHTML=`
    <div class="metric-grid">
      <div class="metric"><div class="val">${todayMin}</div><div class="lbl">今日（分）</div></div>
      <div class="metric"><div class="val">${periodMin}</div><div class="lbl">${periodLabel}（分）</div></div>
      <div class="metric"><div class="val streak-val">${streak}🔥</div><div class="lbl">連續天數</div></div>
    </div>

    <div class="card">
      <div class="card-title">${periodLabel}學習趨勢</div>
      <div class="trend-wrap">
        ${trendCols.map(c=>`
          <div class="trend-col">
            <div class="trend-min">${c.min>0?c.min:''}</div>
            <div class="trend-bar ${cc}" style="height:${Math.round(c.min/maxT*64)}px"></div>
            <div class="trend-day">${c.label}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="card">
      <div class="card-title">各科累計時間（${periodLabel}）</div>
      ${subjectArr.map(([s,m])=>`
        <div class="bar-row">
          <div class="bar-label">${s}</div>
          <div class="bar-wrap"><div class="bar-fill ${m>0?cc:'zero'}" style="width:${m>0?Math.round(m/maxS*100):2}%"></div></div>
          <div class="bar-num">${m>0?m+'分':'—'}</div>
        </div>
      `).join('')}
    </div>

    <div class="card">
      <div class="card-title">📝 進度紀錄（${periodLabel}）</div>
      ${logs.length===0?'<div class="empty">這段期間沒有填寫進度</div>':
        logs.map(r=>{
          const d=new Date(r.timestamp);
          const dateStr=`${d.getMonth()+1}/${d.getDate()}（週${DAYS[d.getDay()]}）`;
          return`<div class="log-item">
            <div class="log-top">
              <div class="log-date">${dateStr}</div>
              <div class="log-time">${r.time} 分</div>
            </div>
            <div class="log-subjects">${r.subjects||''}</div>
            <div class="log-progress">📌 ${r.progress}</div>
            ${r.ways?`<div class="log-ways">${r.ways}</div>`:''}
          </div>`;
        }).join('')
      }
    </div>
  `;
}

loadStats();
</script>
</body>
</html>
